<!DOCTYPE html><html><head><base target='_top'><meta charset='UTF-8'><style>body{font-family:Arial;background:#f8fafc;margin:0;padding:20px}.box{max-width:1100px;margin:auto;background:white;border-radius:14px;padding:22px}.hide{display:none}.panel{border:1px solid #ddd;background:#fafafa;border-radius:10px;padding:14px;margin:12px 0}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}input,select,textarea{width:100%;box-sizing:border-box;padding:9px}button{background:#2563eb;color:white;border:0;border-radius:8px;padding:9px 12px;margin:3px}.sec{background:#475569}.msg{padding:9px;border-radius:8px}.ok{background:#d1fae5}.bad{background:#fee2e2}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.card{background:#eef2ff;border-radius:10px;padding:10px}table{border-collapse:collapse;width:100%;margin:10px 0}th,td{border:1px solid #ddd;padding:7px;text-align:left}th{background:#1e293b;color:white}</style></head><body><div class='box'><h1>Faculty Dashboard</h1><div id='pinPanel' class='panel'><label>Faculty PIN</label><input id='pin' type='password'><button onclick='unlock()'>Unlock</button><div id='umsg' class='msg hide'></div></div><div id='app' class='hide'><button onclick='showTab(`dash`)'>Dashboard</button><button onclick='showTab(`act`)'>Activity</button><button onclick='showTab(`rub`)'>Rubric</button><button onclick='showTab(`cor`)'>Corrections</button><button onclick='showTab(`rep`)'>Report</button><button class='sec' onclick='unlock()'>Refresh</button><button class='sec' onclick='window.print()'>Print</button><section id='dash' class='panel'></section><section id='act' class='panel hide'><h2>Activity Settings</h2><div class='grid'><p><label>Activity</label><input id='aa'></p><p><label>Name</label><input id='an'></p><p><label>Class</label><input id='ac'></p><p><label>Group</label><input id='ag'></p><p><label>Status</label><select id='as'><option>Active</option><option>Inactive</option></select></p><p><label>Allow Reg</label><select id='ar'><option value='true'>true</option><option value='false'>false</option></select></p><p><label>Reg Opens</label><input id='aro' type='datetime-local'></p><p><label>Reg Closes</label><input id='arc' type='datetime-local'></p><p><label>Eval Opens</label><input id='aeo' type='datetime-local'></p><p><label>Eval Closes</label><input id='aec' type='datetime-local'></p></div><button onclick='saveActivity()'>Save Activity</button><div id='amsg' class='msg hide'></div></section><section id='rub' class='panel hide'><h2>Rubric</h2><div class='grid'><p><label>Activity</label><input id='rba'></p><p><label>Class</label><input id='rbc'></p></div><p>Separate criteria with semicolons. Format: ID | Label | Max | Weight | Required | Status</p><textarea id='rbx' rows='5'>cooperation | Cooperation | 10 | 20 | true | Active; contribution | Contribution | 10 | 30 | true | Active; communication | Communication | 10 | 15 | true | Active; problemSolving | Problem Solving | 10 | 15 | true | Active; qualityOfWork | Quality of Work | 10 | 20 | true | Active</textarea><button onclick='saveRubric()'>Save Rubric</button><div id='rbmsg' class='msg hide'></div></section><section id='cor' class='panel hide'><h2>Corrections</h2><div class='grid'><p><label>Activity</label><input id='ca'></p><p><label>Class</label><input id='cc'></p><p><label>Student ID</label><input id='cs'></p><p><label>New Group</label><input id='cg'></p></div><button onclick='moveGroup()'>Move Group</button><p><label>New Contribution</label><textarea id='cco'></textarea></p><button onclick='updContrib()'>Update Contribution</button><p><label>Status</label><select id='cst'><option>Active</option><option>Inactive</option></select></p><button onclick='setStatus()'>Set Status</button><div id='cmsg' class='msg hide'></div></section><section id='rep' class='panel hide'><h2>Report</h2><div class='grid'><p><label>Class</label><select id='fc'></select></p><p><label>Activity</label><select id='fa'></select></p><p><label>Group</label><select id='fg'></select></p><p><button onclick='generateReport()'>Generate</button></p></div></section></div><div id='out' class='panel'>Unlock the dashboard to begin.</div></div><script>let st={pin:'',state:null,report:null};function q(id){return document.getElementById(id)}function msg(id,t,x){let e=q(id);e.className='msg '+t;e.textContent=x;e.classList.remove('hide')}function unlock(){st.pin=q('pin').value||st.pin;google.script.run.withSuccessHandler(r=>{if(!r.success)return msg('umsg','bad',r.message);st.state=r;q('pinPanel').classList.add('hide');q('app').classList.remove('hide');renderDash();fillFilters();q('out').textContent='Unlocked.'}).unlockFaculty(st.pin)}function showTab(id){['dash','act','rub','cor','rep'].forEach(x=>q(x).classList.toggle('hide',x!==id))}function renderDash(){let d=st.state.dashboard;q('dash').innerHTML='<h2>Dashboard</h2><div class=cards>'+card('Activities',d.totalActivities)+card('Active',d.activeActivities)+card('Classes',d.classes)+card('Cohorts',d.cohorts)+card('Students',d.registeredStudents)+card('Submitted',d.submittedEvaluations)+card('Incomplete',d.incompleteEvaluators)+card('1-member groups',d.singleMemberGroups)+'</div>'+table('Incomplete Evaluators',['Activity','Class','Group','Student','Missing'],(d.incomplete||[]).map(x=>[x.activityKey,x.classId,x.groupKey,x.name,(x.missingTargets||[]).join(', ')]))}function card(a,b){return '<div class=card><small>'+esc(a)+'</small><br><b>'+esc(b)+'</b></div>'}function fillFilters(){let o=st.state.options;fill(fc,o.classes,'Select Class',false);fill(fa,o.activities,'All Activities',true);fill(fg,o.groups,'All Groups',true)}function fill(el,arr,label,all){el.innerHTML='';let op=document.createElement('option');op.value=all?'ALL':'';op.textContent=label;el.appendChild(op);(arr||[]).forEach(v=>{let o=document.createElement('option');o.value=v;o.textContent=v;el.appendChild(o)})}function saveActivity(){let d={activityKey:aa.value,activityName:an.value,classId:ac.value,groupKey:ag.value,status:as.value,allowRegistration:ar.value,regOpen:aro.value,regClose:arc.value,evalOpen:aeo.value,evalClose:aec.value};google.script.run.withSuccessHandler(r=>done(r,'amsg')).saveActivitySettings(d,st.pin)}function saveRubric(){let criteria=rbx.value.split(';').map(line=>{let p=line.split('|').map(x=>x.trim());return{id:p[0],label:p[1],maxScore:Number(p[2]),weight:Number(p[3]),required:p[4],status:p[5]||'Active'}});google.script.run.withSuccessHandler(r=>done(r,'rbmsg')).saveRubric({activityKey:rba.value,classId:rbc.value,criteria},st.pin)}function moveGroup(){google.script.run.withSuccessHandler(r=>done(r,'cmsg')).moveStudentToGroup({activityKey:ca.value,classId:cc.value,studentId:cs.value,newGroupKey:cg.value},st.pin)}function updContrib(){google.script.run.withSuccessHandler(r=>done(r,'cmsg')).updateStudentContribution({activityKey:ca.value,classId:cc.value,studentId:cs.value,contribution:cco.value},st.pin)}function setStatus(){google.script.run.withSuccessHandler(r=>done(r,'cmsg')).setRegistrationStatus({activityKey:ca.value,classId:cc.value,studentId:cs.value,status:cst.value},st.pin)}function done(r,id){msg(id,r.success?'ok':'bad',r.message);if(r.success){st.state=r;renderDash();fillFilters()}}function generateReport(){google.script.run.withSuccessHandler(r=>{if(!r.success){q('out').textContent=r.message;return}st.report=r;renderReport(r)}).generateReportData({classId:fc.value,activityKey:fa.value,groupKey:fg.value},st.pin)}function renderReport(r){q('out').innerHTML='<h1>Report: Class '+esc(r.filters.classId)+'</h1><p>Activity: '+esc(r.filters.activityKey)+' | Group: '+esc(r.filters.groupKey)+' | Generated: '+esc(r.generatedAt)+'</p><div class=cards>'+card('Students',r.totals.registeredStudents)+card('Cohorts',r.totals.cohorts)+card('Submitted',r.totals.submittedEvaluations)+card('Expected',r.totals.expectedEvaluations)+card('Avg %',r.totals.averagePercent??'—')+'</div>'+table('Cohorts',['Activity','Class','Group','Members','Submitted','Expected','Completion','Avg %'],r.cohorts.map(x=>[x.activityKey,x.classId,x.groupKey,x.memberCount,x.submittedEvaluations,x.expectedEvaluations,x.completionPercent+'%',x.averagePercent??'—']))+table('Student Summary',['Activity','Group','Student','Received','Expected','Avg %','Missing Evaluators'],r.summary.map(x=>[x.activityKey,x.groupKey,x.name+' ('+x.studentId+')',x.receivedCount,x.expectedCount,x.averagePercent??'—',(x.missingEvaluators||[]).join(', ')]))+table('Completion',['Activity','Group','Evaluator','Submitted','Expected','Missing Targets'],r.completion.map(x=>[x.activityKey,x.groupKey,x.name+' ('+x.studentId+')',x.submittedCount,x.expectedCount,(x.missingTargets||[]).join(', ')]))+table('Logs',['Time','Activity','Group','Target','Evaluator','Weighted %','Comments'],r.details.map(x=>[x.timestamp,x.activityKey,x.groupKey,x.targetName,x.evaluatorName,x.weightedPercent,x.comments]))}function table(title,heads,rows){let h='<h2>'+esc(title)+'</h2><table><tr>'+heads.map(x=>'<th>'+esc(x)+'</th>').join('')+'</tr>';return h+(rows.length?rows.map(r=>'<tr>'+r.map(c=>'<td>'+esc(c??'')+'</td>').join('')+'</tr>').join(''):'<tr><td colspan='+heads.length+'>No rows</td></tr>')+'</table>'}function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}</script></body></html>
