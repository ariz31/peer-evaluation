<!DOCTYPE html><html><head><base target='_top'><meta charset='UTF-8'><style>:root{--p:#0f172a;--b:#2563eb;--bg:#f1f5f9;--m:#64748b;--l:#cbd5e1;--s:#f59e0b}body{margin:0;padding:24px;font-family:Segoe UI,Arial,sans-serif;background:var(--bg);color:#334155}.box{max-width:820px;margin:auto;background:#fff;border-radius:18px;padding:30px;box-shadow:0 12px 24px #0002}.hide{display:none!important}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:#e2e8f0;padding:6px;border-radius:12px;margin:20px 0}.tabs button{background:transparent;color:#475569;box-shadow:none}.tabs .on{background:#fff;color:var(--b)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:720px){.grid{grid-template-columns:1fr}.box{padding:20px}}label{display:block;font-weight:800;color:var(--p);margin:12px 0 5px}.help{color:var(--m);font-size:.86rem}input,textarea,select{width:100%;box-sizing:border-box;padding:12px;border:1.5px solid var(--l);border-radius:10px;font:inherit;background:#f8fafc}textarea{min-height:90px}button{border:0;background:var(--b);color:#fff;padding:12px 16px;border-radius:10px;font-weight:800;cursor:pointer}button:disabled{background:#94a3b8}.msg{margin-top:12px;padding:12px;border-radius:10px;font-weight:800}.ok{background:#d1fae5;color:#047857}.bad{background:#fee2e2;color:#b91c1c}.card{border:1px solid #bfdbfe;background:#eff6ff;border-radius:14px;padding:15px;margin:15px 0}.member{border:1px solid #cbd5e1;background:#f8fafc;border-radius:14px;padding:15px;margin:15px 0}.contrib{white-space:pre-wrap;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px}.crit{border-top:1px solid #e2e8f0;padding:14px 0}.stars{display:flex;gap:4px;flex-wrap:wrap;align-items:center}.star{background:transparent;color:#cbd5e1;box-shadow:none;padding:0 2px;font-size:1.65rem}.star.on{color:var(--s)}.score{margin-left:8px;color:var(--m);font-weight:800}</style></head><body><div class='box'><h1>Student Peer Evaluation</h1><p class='help'>Activities are default-first. Enter the activity, class, and group provided by your teacher.</p><div class='tabs'><button id='tReg' class='on' onclick='tab(&quot;reg&quot;)'>1. Registration</button><button id='tEval' onclick='tab(&quot;eval&quot;)'>2. Evaluation</button></div><section id='reg'><h2>Register</h2><form onsubmit='event.preventDefault();registerMe()'><div class='grid'><div><label>Activity Key / Name</label><input id='ra' required style='text-transform:uppercase'></div><div><label>Class ID</label><input id='rc' required style='text-transform:uppercase'></div></div><div class='grid'><div><label>Group Key</label><input id='rg' required style='text-transform:uppercase'></div><div><label>Student ID</label><input id='rs' required style='text-transform:uppercase'></div></div><div class='grid'><div><label>Full Name</label><input id='rn' required></div><div><label>Project Role</label><input id='rr' required></div></div><label>Contribution Details</label><textarea id='rco' required></textarea><button id='rb'>Register</button><div id='rmsg' class='msg hide'></div></form></section><section id='evalPage' class='hide'><h2>Evaluate</h2><div id='verifyBox'><div class='grid'><div><label>Activity</label><input id='ea' required style='text-transform:uppercase'></div><div><label>Class ID</label><input id='ec' required style='text-transform:uppercase'></div></div><label>Student ID</label><input id='es' required style='text-transform:uppercase'><br><br><button id='vb' onclick='verify()'>Verify & Load Group</button><div id='vmsg' class='msg hide'></div></div><form id='ef' class='hide' onsubmit='event.preventDefault();submitEval()'><div class='card'><b>Evaluator:</b> <span id='who'></span><br><b>Activity/Class/Group:</b> <span id='ctx'></span><br><b>Progress:</b> <span id='prog'></span></div><label>Select member</label><select id='target' onchange='showMember()'></select><div id='mcard' class='member hide'><h3 id='mn'></h3><p><b>Role:</b> <span id='mr'></span></p><p><b>Registered Contribution</b></p><div id='mc' class='contrib'></div></div><div id='ratings'></div><label>Optional Comments</label><textarea id='comments'></textarea><button id='eb'>Submit Evaluation</button><div id='emsg' class='msg hide'></div></form></section></div><script>const st={evaluator:null,targets:[],rubric:[],scores:{}};function tab(x){document.getElementById('reg').classList.toggle('hide',x!=='reg');document.getElementById('evalPage').classList.toggle('hide',x!=='eval');document.getElementById('tReg').classList.toggle('on',x==='reg');document.getElementById('tEval').classList.toggle('on',x==='eval')}function msg(id,type,text){let e=document.getElementById(id);e.className='msg '+type;e.textContent=text;e.classList.remove('hide')}function busy(id,on,text){let b=document.getElementById(id);b.disabled=on;b.textContent=text}function el(id){return document.getElementById(id)}function registerMe(){let d={activityKey:el('ra').value,classId:el('rc').value,groupKey:el('rg').value,studentId:el('rs').value,name:el('rn').value,role:el('rr').value,contribution:el('rco').value};busy('rb',true,'Saving...');google.script.run.withSuccessHandler(r=>{busy('rb',false,'Register');msg('rmsg',r.success?'ok':'bad',r.message);if(r.success){el('ea').value=d.activityKey;el('ec').value=d.classId;el('es').value=d.studentId;document.querySelector('#reg form').reset();setTimeout(()=>tab('eval'),500)}}).withFailureHandler(e=>{busy('rb',false,'Register');msg('rmsg','bad',e.message||String(e))}).saveRegistration(d)}function verify(){busy('vb',true,'Loading...');google.script.run.withSuccessHandler(r=>{busy('vb',false,'Verify & Load Group');if(!r.success){msg('vmsg','bad',r.message);el('ef').classList.add('hide');return}st.evaluator=r.evaluator;st.targets=r.remainingTargets||[];st.rubric=r.rubric||[];if(!st.targets.length){msg('vmsg','ok','No remaining teammates to evaluate.');return}el('verifyBox').classList.add('hide');el('ef').classList.remove('hide');el('who').textContent=st.evaluator.name+' ('+st.evaluator.studentId+')';el('ctx').textContent=[st.evaluator.activityKey,st.evaluator.classId,st.evaluator.groupKey].join(' / ');el('prog').textContent=(r.completedCount||0)+' of '+(r.totalTargets||0)+' completed';fillTargets();renderRatings()}).withFailureHandler(e=>{busy('vb',false,'Verify & Load Group');msg('vmsg','bad',e.message||String(e))}).verifyAndLoadGroup(el('es').value,el('ea').value,el('ec').value)}function fillTargets(){el('target').innerHTML='';st.targets.forEach(m=>{let o=document.createElement('option');o.value=m.studentId;o.textContent=m.name+' ('+m.studentId+')';el('target').appendChild(o)});showMember();reset()}function showMember(){let m=st.targets.find(x=>x.studentId===el('target').value);if(!m){el('mcard').classList.add('hide');return}el('mn').textContent=m.name;el('mr').textContent=m.role||'Not specified';el('mc').textContent=m.contribution||'No contribution details provided.';el('mcard').classList.remove('hide')}function renderRatings(){el('ratings').innerHTML='';st.rubric.forEach(c=>{let w=document.createElement('div');w.className='crit';w.innerHTML='<label>'+esc(c.label)+' <span class=help>(max '+c.maxScore+', weight '+c.weight+')</span></label>';let row=document.createElement('div');row.className='stars';row.setAttribute('role','radiogroup');row.setAttribute('aria-label',c.label);for(let i=1;i<=c.maxScore;i++){let b=document.createElement('button');b.type='button';b.className='star';b.textContent='★';b.setAttribute('role','radio');b.setAttribute('aria-label','Rate '+c.label+' '+i+' out of '+c.maxScore);b.onkeydown=e=>keyRate(e,c,i);b.onclick=()=>rate(c.criterionId,i);row.appendChild(b)}let t=document.createElement('span');t.className='score';t.dataset.score=c.criterionId;t.textContent='Not rated';row.appendChild(t);w.appendChild(row);el('ratings').appendChild(w)})}function keyRate(e,c,i){if(e.key==='ArrowRight'||e.key==='ArrowUp'){e.preventDefault();rate(c.criterionId,Math.min(c.maxScore,(st.scores[c.criterionId]||i)+1))}if(e.key==='ArrowLeft'||e.key==='ArrowDown'){e.preventDefault();rate(c.criterionId,Math.max(1,(st.scores[c.criterionId]||i)-1))}}function rate(id,v){st.scores[id]=v;let idx=st.rubric.findIndex(c=>c.criterionId===id), row=el('ratings').children[idx].querySelectorAll('.star');row.forEach((s,i)=>{s.classList.toggle('on',i<v);s.setAttribute('aria-checked',i===v-1?'true':'false')});document.querySelector(`[data-score='${id}']`).textContent=v+' / '+st.rubric[idx].maxScore}function reset(){st.scores={};document.querySelectorAll('.star').forEach(s=>s.classList.remove('on'));document.querySelectorAll('.score').forEach(s=>s.textContent='Not rated')}function submitEval(){for(const c of st.rubric){if(c.required&&!st.scores[c.criterionId])return msg('emsg','bad','Please rate '+c.label+'.')}let d={activityKey:st.evaluator.activityKey,classId:st.evaluator.classId,evaluatorStudentId:st.evaluator.studentId,targetStudentId:el('target').value,scores:st.scores,comments:el('comments').value};busy('eb',true,'Saving...');google.script.run.withSuccessHandler(r=>{busy('eb',false,'Submit Evaluation');msg('emsg',r.success?'ok':'bad',r.message);if(r.success){st.targets=r.remainingTargets||[];el('comments').value='';if(!st.targets.length){el('ef').classList.add('hide');el('verifyBox').classList.remove('hide');msg('vmsg','ok','All teammates have been evaluated.')}else fillTargets();el('prog').textContent=(r.completedCount||0)+' of '+(r.totalTargets||0)+' completed'}}).withFailureHandler(e=>{busy('eb',false,'Submit Evaluation');msg('emsg','bad',e.message||String(e))}).saveEvaluation(d)}function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}</script></body></html>
